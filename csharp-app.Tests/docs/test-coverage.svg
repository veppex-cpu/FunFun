<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Game of Life Test Coverage</title>
  <desc id="desc">Diagram showing the categories covered by the Game of Life API test suite.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .center { fill: #ffffff; stroke: #1d4ed8; stroke-width: 2.4; rx: 10; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.8; rx: 8; }
      .green { fill: #f0fdf4; stroke: #15803d; }
      .amber { fill: #fffbeb; stroke: #b45309; }
      .blue { fill: #eff6ff; stroke: #1d4ed8; }
      .rose { fill: #fff1f2; stroke: #be123c; }
      .purple { fill: #faf5ff; stroke: #7e22ce; }
      .text-title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .text-sub { font: 14px Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="720"/>
  <text class="text-title" x="40" y="50">Game of Life API Test Coverage</text>
  <text class="text-sub" x="40" y="76">63 executable tests covering service logic, persistence, validation, domain rules, and selected real HTTP behavior.</text>

  <rect class="center" x="420" y="300" width="280" height="100"/>
  <text class="label" x="470" y="336">csharp-app.Tests</text>
  <text class="small" x="452" y="360">Executable test runner</text>
  <text class="small" x="488" y="380">63 passing tests</text>

  <rect class="box blue" x="70" y="140" width="250" height="110"/>
  <text class="label" x="120" y="172">API Contract</text>
  <text class="small" x="94" y="198">Upload, Location, response schema</text>
  <text class="small" x="94" y="218">Next, N states, unknown ids</text>

  <rect class="box green" x="435" y="120" width="250" height="122"/>
  <text class="label" x="498" y="152">Game Rules</text>
  <text class="small" x="462" y="178">Under/overpopulation</text>
  <text class="small" x="462" y="198">Reproduction and survival</text>
  <text class="small" x="462" y="218">Block, blinker, glider, toad, beacon</text>

  <rect class="box amber" x="800" y="140" width="250" height="110"/>
  <text class="label" x="868" y="172">Persistence</text>
  <text class="small" x="826" y="198">Restart/recreate repository</text>
  <text class="small" x="826" y="218">JSON files, temp files, corruption</text>

  <rect class="box rose" x="70" y="470" width="250" height="122"/>
  <text class="label" x="132" y="502">Validation</text>
  <text class="small" x="96" y="528">Null, empty, shape, characters</text>
  <text class="small" x="96" y="548">Aliases and size limits</text>
  <text class="small" x="96" y="568">Steps/maxAttempts bounds</text>

  <rect class="box purple" x="435" y="500" width="250" height="122"/>
  <text class="label" x="500" y="532">Final State</text>
  <text class="small" x="462" y="558">Still-life success</text>
  <text class="small" x="462" y="578">Oscillator cycle detection</text>
  <text class="small" x="462" y="598">Max-attempt exceeded</text>

  <rect class="box blue" x="800" y="470" width="250" height="122"/>
  <text class="label" x="854" y="502">Integration</text>
  <text class="small" x="826" y="528">Starts real API process</text>
  <text class="small" x="826" y="548">Real HTTP upload</text>
  <text class="small" x="826" y="568">Malformed query and headers</text>

  <path class="line" d="M320 210 C390 230 412 276 440 314"/>
  <path class="line" d="M560 242 V300"/>
  <path class="line" d="M800 210 C730 230 708 276 680 314"/>
  <path class="line" d="M320 530 C390 505 412 430 450 390"/>
  <path class="line" d="M560 500 V400"/>
  <path class="line" d="M800 530 C730 505 708 430 670 390"/>

  <rect class="box" x="230" y="650" width="660" height="38"/>
  <text class="small" x="260" y="674">Goal: prove the original exercise requirements plus reviewer concerns before submission.</text>
</svg>
